<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hardy Store</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f0f14;
  --card:#1a1b22;
  --accent:#ff4ecd;
  --accent2:#ff9a3c;
  --text:#ffffff;
  --sub:#a0a0a0;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}

body{background:var(--bg);color:var(--text);}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#12131a;
  position:sticky;
  top:0;
}

.logo{
  font-weight:700;
  font-size:20px;
  color:var(--accent);
}

nav a{
  margin:0 10px;
  color:var(--text);
  text-decoration:none;
}

.cart{
  cursor:pointer;
  background:var(--accent);
  padding:8px 14px;
  border-radius:8px;
}

/* HERO */
.hero{
  padding:50px 30px;
  background:linear-gradient(90deg,#1a1b22,#0f0f14);
}

.hero h1{
  font-size:32px;
}

.hero p{
  color:var(--sub);
  margin-top:10px;
}

/* SEARCH */
.search{
  margin:20px 30px;
}

.search input{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
}

/* GRID */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:12px;
  transition:.2s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  border-radius:10px;
}

.card h3{
  margin:10px 0;
}

.price{
  color:var(--accent2);
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  background:var(--accent);
  color:white;
  cursor:pointer;
}

/* CART PANEL */
.cart-panel{
  position:fixed;
  right:-350px;
  top:0;
  width:300px;
  height:100%;
  background:#1a1b22;
  padding:20px;
  transition:.3s;
}

.cart-panel.active{
  right:0;
}

.cart-item{
  margin-bottom:10px;
}

.total{
  margin-top:20px;
  font-weight:700;
}
</style>
</head>

<body>

<header>
  <div class="logo">Hardy Store</div>
  <nav>
    <a href="#">Loja</a>
    <a href="#">Vender</a>
    <a href="#">Login</a>
  </nav>
  <div class="cart" onclick="toggleCart()">Carrinho 🛒</div>
</header>

<section class="hero">
  <h1>Itens raros. Negócios rápidos.</h1>
  <p>Marketplace de MM2 com estilo e confiança.</p>
</section>

<div class="search">
  <input type="text" placeholder="Buscar itens...">
</div>

<section class="products" id="products"></section>

<!-- CART -->
<div class="cart-panel" id="cartPanel">
  <h2>Carrinho</h2>
  <div id="cartItems"></div>
  <div class="total" id="total">Total: R$0</div>
</div>

<script>
const products = [
  {name:"Chroma Knife", price:120, img:"https://via.placeholder.com/200"},
  {name:"Godly Gun", price:90, img:"https://via.placeholder.com/200"},
  {name:"Legendary Set", price:60, img:"https://via.placeholder.com/200"},
  {name:"Rare Knife", price:30, img:"https://via.placeholder.com/200"}
];

const cart = [];

function renderProducts(){
  const container = document.getElementById("products");
  container.innerHTML = "";

  products.forEach((p,i)=>{
    container.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p class="price">R$ ${p.price}</p>
        <button onclick="addToCart(${i})">Adicionar</button>
      </div>
    `;
  });
}

function addToCart(i){
  cart.push(products[i]);
  renderCart();
}

function renderCart(){
  const items = document.getElementById("cartItems");
  const total = document.getElementById("total");

  items.innerHTML = "";
  let sum = 0;

  cart.forEach(item=>{
    items.innerHTML += `<div class="cart-item">${item.name} - R$${item.price}</div>`;
    sum += item.price;
  });

  total.innerText = "Total: R$" + sum;
}

function toggleCart(){
  document.getElementById("cartPanel").classList.toggle("active");
}

renderProducts();
</script>

</body>
</html>
